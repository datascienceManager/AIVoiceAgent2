# nginx/nginx.conf
# Reverse proxy for the voice agent POC stack

events {
    worker_connections 1024;
}

http {
    upstream orchestrator {
        server langchain-api:8000;
    }

    upstream livekit {
        server livekit:7880;
    }

    server {
        listen 80;
        server_name _;

        # Orchestration API
        location /api/ {
            proxy_pass         http://orchestrator/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            client_max_body_size 50M;   # allow large audio uploads
        }

        # LiveKit WebSocket upgrade
        location /ws/ {
            proxy_pass         http://livekit/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://orchestrator/health;
        }

        # Default — serve demo UI (if you have one)
        location / {
            return 200 '{"status":"voice agent running"}';
            add_header Content-Type application/json;
        }
    }
}
